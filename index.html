<!DOCTYPE html>
<html>

<head>
<title>SMS Chatbot Order</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f5f5f5;
}

#chatButton{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
border-radius:50%;
border:none;
background:#0073aa;
color:white;
font-size:24px;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

/* chatbot container */

#chatContainer{
position:fixed;
bottom:90px;
right:20px;
width:320px;
background:white;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
display:none;
overflow:hidden;
}

/* header */

#chatHeader{
background:#0073aa;
color:white;
padding:12px;
text-align:center;
font-weight:bold;
}



#chatWindow{
height:260px;
overflow-y:auto;
padding:10px;
background:#fafafa;
}



.user{
background:#0073aa;
color:white;
padding:8px 12px;
border-radius:15px;
margin:5px;
max-width:80%;
float:right;
clear:both;
}



.bot{
background:#e5e5ea;
padding:8px 12px;
border-radius:15px;
margin:5px;
max-width:80%;
float:left;
clear:both;
}



#userInput{
width:100%;
padding:10px;
border:none;
border-top:1px solid #ddd;
}

</style>

</head>

<body>

<button id="chatButton">💬</button>

<div id="chatContainer">

<div id="chatHeader">
Restaurant Chatbot
</div>

<div id="chatWindow"></div>

<input type="text" id="userInput" placeholder="Type your order...">

</div>

<script src="chat.js"></script>
<script src="Order.js"></script>

<script>



document.getElementById("chatButton").onclick = function(){

let chat = document.getElementById("chatContainer");

if(chat.style.display === "none"){
chat.style.display = "block";
}else{
chat.style.display = "none";
}

};

</script>

</body>
</html>
